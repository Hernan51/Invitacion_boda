<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inspiracion Boda | Karen & Sergio</title>

  <link rel="stylesheet" href="style/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&family=Sacramento&display=swap"
    rel="stylesheet" />

  <style>
    .insp-page {
      min-height: 100vh;
      padding: 34px 14px 48px;
      background:
        linear-gradient(rgba(255, 249, 242, 0.82), rgba(255, 249, 242, 0.82)),
        url("img/kys.jpeg") center/cover no-repeat fixed;
    }

    .insp-shell {
      max-width: 920px;
      margin: 0 auto;
      border: 1px solid rgba(120, 108, 96, 0.22);
      box-shadow: 0 20px 50px rgba(18, 13, 10, 0.16);
      background: #f0e8df;
    }

    .insp-hero {
      position: relative;
      min-height: 520px;
      padding: 24px 28px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #fff;
      overflow: hidden;
    }

    .insp-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("img/portada_boda.jpg") center 40%/cover no-repeat;
      transform: scale(1.03);
    }

    .insp-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, rgba(22, 18, 14, 0.42) 8%, rgba(22, 18, 14, 0.15) 68%);
    }

    .insp-nav,
    .insp-copy {
      position: relative;
      z-index: 1;
    }

    .insp-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      font-family: 'Bona Nova SC', serif;
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .insp-brand {
      font-size: 11px;
      opacity: 0.95;
      white-space: nowrap;
    }

    .insp-brand img {
      width: 110px;
      height: auto;
      border-radius: 0;
      display: block;
    }

    .insp-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .insp-copy {
      max-width: 420px;
      margin-top: 110px;
      font-family: 'Bona Nova SC', serif;
    }

    .insp-couple {
      margin: 0;
      line-height: 1.05;
      color: #fff;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }

    .insp-couple.names-alt {
      margin-bottom: 0;
      font-size: clamp(54px, 8vw, 94px);
      color: #fff;
      font-family: 'Bona Nova SC', serif;
    }

    .insp-body {
      background: #efe8df;
      padding: 54px 38px 58px;
    }

    .insp-intro {
      text-align: center;
      max-width: 700px;
      margin: 0 auto 34px;
      color: #4e4540;
    }

    .insp-intro h2 {
      margin: 0 0 10px;
      font-size: clamp(27px, 3.1vw, 38px);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: 'Playfair Display', serif;
      font-weight: 600;
    }

    .insp-intro p {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
    }

    .insp-benefits {
      margin: 0 auto 44px;
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 18px;
      text-align: center;
    }

    .insp-benefit img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      margin: 0 auto 9px;
      border-radius: 0;
      opacity: 0.75;
    }

    .insp-benefit span {
      display: block;
      font-size: 12px;
      line-height: 1.45;
      color: #625650;
    }

    .insp-note {
      margin: 0 0 18px;
      text-align: center;
      font-size: 30px;
      color: #7d7168;
    }

    .insp-carousel {
      position: relative;
      margin-top: 8px;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    .insp-viewport {
      overflow: hidden;
    }

    .insp-track {
      display: flex;
      align-items: stretch;
      gap: 0 !important;
      line-height: 0;
      will-change: transform;
    }

    .insp-slide {
      display: block;
      flex: 0 0 calc(100% / 3) !important;
      width: calc(100% / 3);
      aspect-ratio: 3 / 4;
      overflow: hidden;
      border-right: 0;
      margin: 0 !important;
      padding: 0 !important;
      min-width: 0;
    }

    .insp-slide:last-child {
      border-right: 0;
    }

    .insp-slide img {
      width: 100% !important;
      min-width: 100%;
      max-width: none !important;
      height: 100% !important;
      object-fit: cover !important;
      display: block;
      margin: 0 !important;
      padding: 0 !important;
      border-radius: 0 !important;
      cursor: zoom-in;
    }

    .insp-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
      color: #fff;
      font-size: 34px;
      line-height: 1;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .insp-arrow:hover {
      background: rgba(255, 255, 255, 0.45);
    }

    .insp-arrow.prev {
      left: 14px;
      padding-bottom: 3px;
    }

    .insp-arrow.next {
      right: 14px;
      padding-bottom: 3px;
    }

    .insp-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.82);
      padding: 20px;
    }

    .insp-lightbox.open {
      display: flex;
    }

    .insp-lightbox img {
      max-width: min(94vw, 980px);
      max-height: 90vh;
      width: auto !important;
      height: auto !important;
      border-radius: 0 !important;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.45);
    }

    .insp-lightbox-close {
      position: absolute;
      top: 16px;
      right: 18px;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 30px;
      line-height: 1;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .insp-footer {
      background: #2f2f2f;
      min-height: 86px;
      border-top: 2px solid rgba(255, 255, 255, 0.2);
    }

    .insp-bottom-logo {
      background: #2f2f2f;
      display: flex;
      justify-content: center;
      padding: 0 0 24px;
    }

    .insp-bottom-logo img {
      width: 126px;
      height: auto;
      border-radius: 0;
    }

    @media (max-width: 860px) {
      .insp-page {
        padding: 0;
        background: #f7f1e8;
      }

      .insp-shell {
        border: none;
        box-shadow: none;
      }

      .insp-hero {
        min-height: 470px;
        padding: 20px 18px 28px;
      }

      .insp-hero::before {
        background-image: url("img/portada_boda.jpg");
        background-position: center 44%;
      }

      .insp-nav {
        font-size: 11px;
        letter-spacing: .1em;
      }

      .insp-brand {
        font-size: 10px;
      }

      .insp-links {
        gap: 10px;
      }

      .insp-copy {
        margin-top: 86px;
      }

      .insp-couple.names-alt {
        font-size: clamp(48px, 13vw, 74px);
      }

      .insp-body {
        padding: 38px 0 44px;
      }

      .insp-intro p {
        font-size: 13px;
      }

      .insp-benefits {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
        gap: 16px 10px;
        margin-bottom: 30px;
      }

      .insp-note {
        font-size: 26px;
      }

      .insp-slide {
        flex-basis: 50%;
        aspect-ratio: 2.8 / 4.2;
      }

      .insp-arrow {
        width: 40px;
        height: 40px;
        font-size: 30px;
      }
    }

    @media (max-width: 560px) {
      .insp-slide {
        flex-basis: 78%;
      }

      .insp-arrow {
        width: 36px;
        height: 36px;
        font-size: 27px;
      }

      .insp-arrow.prev {
        left: 10px;
      }

      .insp-arrow.next {
        right: 10px;
      }
    }
  </style>
</head>

<body>
  <main class="insp-page">
    <section class="insp-shell">
      <header class="insp-hero">
        <div class="insp-nav">
          <div class="insp-brand">
            Karen & Sergio
          </div>
          <nav class="insp-links" aria-label="Menu principal">
            <a href="#">Inicio</a>
            <a href="#">Nuestra historia</a>
            <a href="#">Galeria</a>
            <a href="#">Contacto</a>
          </nav>
        </div>

        <div class="insp-copy">
          <h1 class="names-alt insp-couple">
            <span class="first">Karen</span>
            <span class="amp-alt">&</span>
            <span class="last">Sergio</span>
          </h1>
        </div>
      </header>

      <div class="insp-body">
        <div class="insp-intro">
          <h2>SÁBADO 11 DE JULIO</h2>
          <h2>2026</h2>
          
        </div>

        <div class="countdown dancing-script" id="countdown" style="font-size: 20px;">“Dios juntó nuestras manos y nos
        señaló el camino. <br>

        Nosotros uniremos nuestras vidas y lo recorreremos con fé y amor. ”
      </div>


        <section class="insp-carousel" aria-label="Carrusel de fotos">
          <button class="insp-arrow prev" type="button" aria-label="Foto anterior">&#8249;</button>
          <div class="insp-viewport">
            <div class="insp-track" id="inspTrack">
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1013%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1037%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1054%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1077%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1089%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1098%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1109%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1114%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1117%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
            </div>
          </div>
          <button class="insp-arrow next" type="button" aria-label="Siguiente foto">&#8250;</button>
        </section>

        <div class="insp-lightbox" id="inspLightbox" aria-hidden="true">
          <button class="insp-lightbox-close" type="button" aria-label="Cerrar imagen">&times;</button>
          <img id="inspLightboxImg" src="" alt="Foto ampliada" />
        </div>
      </div>

      <div class="insp-footer"></div>
      <div class="insp-bottom-logo">
        <img src="img/logo.png" alt="Logo Karen y Sergio" />
      </div>
    </section>
  </main>
  <script>
    (function () {
      const track = document.getElementById('inspTrack');
      if (!track) return;

      const carousel = track.closest('.insp-carousel');
      const prevBtn = carousel.querySelector('.insp-arrow.prev');
      const nextBtn = carousel.querySelector('.insp-arrow.next');
      const originalSlides = Array.from(track.children);
      const total = originalSlides.length;
      const cloneCount = Math.min(4, total);
      const lightbox = document.getElementById('inspLightbox');
      const lightboxImg = document.getElementById('inspLightboxImg');
      const lightboxClose = lightbox.querySelector('.insp-lightbox-close');

      for (let i = total - cloneCount; i < total; i += 1) {
        track.insertBefore(originalSlides[i].cloneNode(true), track.firstChild);
      }
      for (let i = 0; i < cloneCount; i += 1) {
        track.appendChild(originalSlides[i].cloneNode(true));
      }

      let index = cloneCount;
      let autoplayId = null;

      function getSlideWidth() {
        const firstSlide = track.children[0];
        return firstSlide ? firstSlide.getBoundingClientRect().width : 0;
      }

      function move(animate) {
        track.style.transition = animate ? 'transform 0.62s ease' : 'none';
        track.style.transform = `translateX(${-index * getSlideWidth()}px)`;
      }

      function next() {
        index += 1;
        move(true);
      }

      function prev() {
        index -= 1;
        move(true);
      }

      function startAutoplay() {
        stopAutoplay();
        autoplayId = setInterval(next, 2000);
      }

      function stopAutoplay() {
        if (autoplayId) {
          clearInterval(autoplayId);
          autoplayId = null;
        }
      }

      track.addEventListener('transitionend', function () {
        if (index >= total + cloneCount) {
          index = cloneCount;
          move(false);
        } else if (index < cloneCount) {
          index = total + cloneCount - 1;
          move(false);
        }
      });

      nextBtn.addEventListener('click', function () {
        next();
        startAutoplay();
      });

      prevBtn.addEventListener('click', function () {
        prev();
        startAutoplay();
      });

      track.addEventListener('click', function (event) {
        const target = event.target;
        if (!(target instanceof HTMLImageElement)) return;
        lightboxImg.src = target.src;
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
        stopAutoplay();
      });

      lightboxClose.addEventListener('click', function () {
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        startAutoplay();
      });

      lightbox.addEventListener('click', function (event) {
        if (event.target !== lightbox) return;
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        startAutoplay();
      });

      document.addEventListener('keydown', function (event) {
        if (event.key !== 'Escape') return;
        if (!lightbox.classList.contains('open')) return;
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        startAutoplay();
      });

      carousel.addEventListener('mouseenter', stopAutoplay);
      carousel.addEventListener('mouseleave', startAutoplay);
      carousel.addEventListener('focusin', stopAutoplay);
      carousel.addEventListener('focusout', startAutoplay);
      window.addEventListener('resize', function () {
        move(false);
      });

      move(false);
      startAutoplay();
    })();
  </script>
</body>

</html>
