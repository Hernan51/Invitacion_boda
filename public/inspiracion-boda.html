<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inspiracion Boda | Karen & Sergio</title>

  <link rel="stylesheet" href="style/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:ital,wght@0,400;0,700;1,400&family=Noto+Sans+SC:wght@400;700&family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&family=Rouge+Script&family=Sacramento&display=swap"
    rel="stylesheet" />

  <style>
    .insp-page {
      min-height: 100vh;
      padding: 34px 14px 48px;
      background:
        linear-gradient(rgba(255, 249, 242, 0.82), rgba(255, 249, 242, 0.82)),
        url("img/kys.jpeg") center/cover no-repeat fixed;
    }

    .insp-shell {
      max-width: 920px;
      margin: 0 auto;
      border: 1px solid rgba(120, 108, 96, 0.22);
      box-shadow: 0 20px 50px rgba(18, 13, 10, 0.16);
      background: #f0e8df;
    }

    .insp-hero {
      position: relative;
      min-height: 520px;
      padding: 24px 28px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #fff;
      overflow: hidden;
    }

    .insp-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("img/portada_boda.jpg") center 75%/cover no-repeat;
      transform: scale(1.03);
    }

    .insp-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, rgba(22, 18, 14, 0.42) 8%, rgba(22, 18, 14, 0.15) 68%);
    }

    .insp-nav,
    .insp-copy,
    .insp-copy-row {
      position: relative;
      z-index: 1;
    }

    .insp-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      font-family: 'Bona Nova SC', serif;
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .insp-brand {
      font-size: 11px;
      opacity: 0.95;
      white-space: nowrap;
    }

    .insp-brand img {
      width: 110px;
      height: auto;
      border-radius: 0;
      display: block;
    }

    .insp-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .insp-copy-row {
      margin-top: 110px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 28px;
    }

    .insp-copy {
      max-width: 420px;
      font-family: 'Bona Nova SC', serif;
    }

    .insp-couple {
      margin: 0;
      line-height: 1.05;
      color: #fff;
      text-shadow: none;
    }

    .insp-couple.names-alt {
      margin-bottom: 0;
      font-size: clamp(54px, 8vw, 94px);
      color: #fff;
      font-family: 'Bona Nova SC', serif;
      transform: translateX(18px);
    }

    .insp-couple .first,
    .insp-couple .last {
      position: relative;
      top: -52px;
    }

    .insp-couple .amp-alt {
      position: relative;
      top: -52px;
      font-family: 'Rouge Script', cursive;
    }

    .insp-couple .first {
      transform: translateX(-70px);
      margin-right: 0;
    }

    .insp-couple .last {
      transform: translateX(70px);
      margin-left: 0;
    }

    .insp-hero-date {
      text-align: right;
      color: #fff;
      text-shadow: none;
      font-family: 'Bona Nova SC', serif;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding-bottom: 8px;
      min-width: 220px;
    }

    .insp-hero-date .day {
      display: block;
      font-size: clamp(22px, 2.8vw, 34px);
      font-weight: 700;
    }

    .insp-hero-date .year {
      display: block;
      margin-top: 4px;
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 700;
      line-height: 1;
    }

    .insp-date-under-hero {
      background: #efe8df;
      padding: 14px 18px 20px;
      text-align: center;
    }

    .insp-hero-date-float {
      position: absolute;
      left: 50%;
      bottom: 84px;
      transform: translateX(-50%);
      z-index: 1;
      text-align: center;
      min-width: 0;
      padding: 0;
    }

    .insp-date-under-hero .insp-hero-date {
      min-width: 0;
      padding: 0;
      text-align: center;
      display: inline-block;
      font-family: 'Bona Nova SC', serif;
    }

    .insp-date-under-hero .insp-hero-date .day {
      font-family: 'Bona Nova SC', serif;
      font-size: clamp(28px, 3.8vw, 54px);
      font-weight: 700;
      letter-spacing: .06em;
    }

    .insp-date-under-hero .insp-hero-date .year {
      font-size: clamp(54px, 6.8vw, 92px);
      font-weight: 700;
      margin-top: 6px;
      letter-spacing: .04em;
    }

    .insp-body {
      background: #efe8df;
      padding: 54px 38px 58px;
    }

    .insp-intro {
      text-align: center;
      max-width: 700px;
      margin: 0 auto 34px;
      color: #4e4540;
    }

    .insp-intro h2 {
      margin: 0 0 10px;
      font-size: clamp(27px, 3.1vw, 38px);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: 'Playfair Display', serif;
      font-weight: 600;
    }

    .insp-intro p {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
    }

    .insp-blessing {
      margin: 0 auto 26px;
      max-width: 760px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #5c5049;
      font-size: clamp(18px, 2.1vw, 22px);
      line-height: 1.7;
      font-family: 'Playfair Display', serif;
      padding: 8px 12px;
    }

    .insp-benefits {
      margin: 0 auto 44px;
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 18px;
      text-align: center;
    }

    .insp-benefit img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      margin: 0 auto 9px;
      border-radius: 0;
      opacity: 0.75;
    }

    .insp-benefit span {
      display: block;
      font-size: 12px;
      line-height: 1.45;
      color: #625650;
    }

    .insp-note {
      margin: 0 0 18px;
      text-align: center;
      font-size: 30px;
      color: #7d7168;
    }

    .insp-countdown-hero {
      position: relative;
      margin: 0 0 18px;
      min-height: 475px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      color: #f6f3ef;
      background: url("img/Carrusel/Preboda Karen & Sergio - Luis Houdin WEB (1150 de 175).jpg") center 64%/cover no-repeat;
    }

    .insp-countdown-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(15, 15, 15, 0.52);
    }

    .insp-countdown-title,
    .insp-countdown-grid {
      position: relative;
      z-index: 1;
    }

    .insp-countdown-title {
      margin: 0 0 22px;
      font-family: 'Playfair Display', serif;
      letter-spacing: .22em;
      text-transform: uppercase;
      font-size: clamp(12px, 1.6vw, 17px);
      font-weight: 400;
      color: rgba(246, 243, 239, 0.88);
    }

    .insp-countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(80px, 1fr));
      gap: clamp(12px, 4vw, 44px);
      width: min(92%, 700px);
    }

    .insp-cd-item {
      margin: 0;
    }

    .insp-cd-value {
      display: block;
      font-family: 'Bona Nova SC', serif;
      font-size: clamp(34px, 5.4vw, 60px);
      font-weight: 400;
      line-height: 1.02;
      letter-spacing: .04em;
      color: #ffffff;
    }

    .insp-cd-label {
      display: block;
      margin-top: 8px;
      font-family: 'Bona Nova SC', serif;
      text-transform: uppercase;
      letter-spacing: .2em;
      font-size: clamp(10px, 1.1vw, 14px);
      color: rgba(246, 243, 239, 0.92);
    }

    .insp-carousel {
      --insp-gap: 4px;
      position: relative;
      margin-top: 8px;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    .insp-viewport {
      overflow: hidden;
    }

    .insp-track {
      display: flex;
      align-items: stretch;
      gap: var(--insp-gap) !important;
      line-height: 0;
      will-change: transform;
    }

    .insp-slide {
      display: block;
      flex: 0 0 calc((100% - (2 * var(--insp-gap))) / 3);
      width: auto;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      border-right: 0;
      margin: 0 !important;
      padding: 0 !important;
      min-width: 0;
    }

    .insp-slide:last-child {
      border-right: 0;
    }

    .insp-slide img {
      width: 100% !important;
      min-width: 100%;
      max-width: none !important;
      height: 100% !important;
      object-fit: cover !important;
      object-position: 46% center !important;
      display: block;
      margin: 0 !important;
      padding: 0 !important;
      border-radius: 0 !important;
      cursor: zoom-in;
    }

    .insp-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
      color: #fff;
      font-size: 34px;
      line-height: 1;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .insp-arrow:hover {
      background: rgba(255, 255, 255, 0.45);
    }

    .insp-arrow.prev {
      left: 14px;
      padding-bottom: 3px;
    }

    .insp-arrow.next {
      right: 14px;
      padding-bottom: 3px;
    }

    .insp-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.82);
      padding: 20px;
    }

    .insp-lightbox.open {
      display: flex;
    }

    .insp-lightbox img {
      max-width: min(94vw, 980px);
      max-height: 90vh;
      width: auto !important;
      height: auto !important;
      border-radius: 0 !important;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.45);
    }

    .insp-lightbox-close {
      position: absolute;
      top: 16px;
      right: 18px;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 30px;
      line-height: 1;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .insp-footer {
      background: #2f2f2f;
      min-height: 86px;
      border-top: 2px solid rgba(255, 255, 255, 0.2);
    }

    .insp-bottom-logo {
      background: #2f2f2f;
      display: flex;
      justify-content: center;
      padding: 0 0 24px;
    }

    .insp-bottom-logo img {
      width: 126px;
      height: auto;
      border-radius: 0;
    }

    @media (max-width: 860px) {
      .insp-page {
        padding: 0;
        background: #f7f1e8;
      }

      .insp-shell {
        border: none;
        box-shadow: none;
      }

      .insp-hero {
        min-height: 470px;
        padding: 20px 18px 28px;
      }

      .insp-hero::before {
        background-image: url("img/portada_boda.jpeg");
        background-position: 14% 44%;
      }

      .insp-nav {
        font-size: 11px;
        letter-spacing: .1em;
      }

      .insp-brand {
        font-size: 10px;
      }

      .insp-links {
        gap: 10px;
      }

      .insp-copy-row {
        margin-top: 86px;
        gap: 16px;
      }

      .insp-couple.names-alt {
        font-size: clamp(48px, 13vw, 74px);
        transform: translateX(12px);
      }

      .insp-couple .first,
      .insp-couple .last {
        top: -30px;
      }

      .insp-couple .amp-alt {
        top: -30px;
      }

      .insp-couple .first {
        transform: translateX(-42px);
      }

      .insp-couple .last {
        transform: translateX(42px);
      }

      .insp-hero-date {
        min-width: 172px;
      }

      .insp-hero-date .day {
        font-size: clamp(16px, 2.8vw, 22px);
      }

      .insp-hero-date .year {
        font-size: clamp(34px, 7vw, 52px);
      }

      .insp-body {
        padding: 38px 0 44px;
      }

      .insp-date-under-hero {
        padding: 10px 14px 14px;
      }

      .insp-hero-date-float {
        bottom: 32px;
      }

      .insp-intro p {
        font-size: 13px;
      }

      .insp-blessing {
        min-height: 96px;
        margin-bottom: 20px;
      }

      .insp-benefits {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
        gap: 16px 10px;
        margin-bottom: 30px;
      }

      .insp-note {
        font-size: 26px;
      }

      .insp-countdown-hero {
        min-height: 475px;
      }

      .insp-countdown-grid {
        gap: 18px;
      }

      .insp-slide {
        flex-basis: 50%;
        aspect-ratio: 2.8 / 4.2;
      }

      .insp-arrow {
        width: 40px;
        height: 40px;
        font-size: 30px;
      }
    }

    @media (max-width: 560px) {
      .insp-carousel {
        --insp-gap: 6px;
      }

      .insp-copy-row {
        margin-top: 72px;
      }

      .insp-couple.names-alt {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        grid-template-areas:
          "first . last"
          ". amp .";
        column-gap: 10px;
        row-gap: 6px;
        align-items: center;
        transform: translateX(8px);
      }

      .insp-couple .first,
      .insp-couple .last,
      .insp-couple .amp-alt {
        display: inline-block;
      }

      .insp-couple .first {
        grid-area: first;
        justify-self: start;
        top: -12px;
        transform: none;
      }

      .insp-couple .last {
        grid-area: last;
        justify-self: end;
        top: -12px;
        transform: none;
      }

      .insp-couple .amp-alt {
        grid-area: amp;
        justify-self: center;
        position: relative;
        top: -12px;
      }

      .insp-countdown-hero {
        min-height: 275px;
      }

      .insp-countdown-grid {
        grid-template-columns: repeat(2, minmax(92px, 1fr));
        gap: 16px 24px;
      }

      .insp-slide {
        flex: 0 0 calc((100% - var(--insp-gap)) / 2);
      }

      .insp-arrow {
        width: 36px;
        height: 36px;
        font-size: 27px;
      }

      .insp-arrow.prev {
        left: 10px;
      }

      .insp-arrow.next {
        right: 10px;
      }
    }

    @media (min-width: 861px) {
      .insp-hero {
        min-height: 100vh;
      }

      .insp-copy-row {
        margin-top: auto;
        justify-content: center;
        align-items: center;
        transform: translateY(-70%);
      }

      .insp-copy {
        max-width: 100%;
        text-align: center;
      }

      .insp-copy-row .insp-hero-date {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="insp-page">
    <section class="insp-shell">
      <header class="insp-hero">
        <div class="insp-nav">
          <div class="insp-brand">
            Karen & Sergio
          </div>
          <nav class="insp-links" aria-label="Menu principal">
            <a href="#">Inicio</a>
            <a href="#">Nuestra historia</a>
            <a href="#">Galeria</a>
            <a href="#">Contacto</a>
          </nav>
        </div>

        <div class="insp-copy-row">
          <div class="insp-copy">
            <h1 class="names-alt insp-couple">
              <span class="first">Karen</span>
              <span class="amp-alt">&</span>
              <span class="last">Sergio</span>
            </h1>
          </div>
        </div>
        <div class="insp-hero-date insp-hero-date-float" aria-label="Fecha de la boda">
          <span class="day">11 DE JULIO DE 2026</span>
        </div>
      </header>

      <div class="insp-body">
        <p class="insp-blessing countdown dancing-script">
          “Dios juntó nuestras manos y nos señaló el camino.<br>
          Nosotros uniremos nuestras vidas y lo recorreremos con fé y amor.”
        </p>

        <section class="insp-countdown-hero" aria-label="Cuenta regresiva para la boda">
          <h3 class="insp-countdown-title">Cuenta regresiva</h3>
          <div class="insp-countdown-grid" id="inspCountdown">
            <p class="insp-cd-item">
              <span class="insp-cd-value" data-unit="days">000</span>
              <span class="insp-cd-label">Dias</span>
            </p>
            <p class="insp-cd-item">
              <span class="insp-cd-value" data-unit="hours">00</span>
              <span class="insp-cd-label">Horas</span>
            </p>
            <p class="insp-cd-item">
              <span class="insp-cd-value" data-unit="minutes">00</span>
              <span class="insp-cd-label">Minutos</span>
            </p>
            <p class="insp-cd-item">
              <span class="insp-cd-value" data-unit="seconds">00</span>
              <span class="insp-cd-label">Segundos</span>
            </p>
          </div>
        </section>


        <section class="insp-carousel" aria-label="Carrusel de fotos">
          <button class="insp-arrow prev" type="button" aria-label="Foto anterior">&#8249;</button>
          <div class="insp-viewport">
            <div class="insp-track" id="inspTrack">
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1013%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1037%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1054%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1077%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1089%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1098%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1109%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1114%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
              <figure class="insp-slide">
                <img src="img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(1117%20de%20175).jpg" alt="Sesion preboda de Karen y Sergio" />
              </figure>
            </div>
          </div>
          <button class="insp-arrow next" type="button" aria-label="Siguiente foto">&#8250;</button>
        </section>

        <div class="insp-lightbox" id="inspLightbox" aria-hidden="true">
          <button class="insp-lightbox-close" type="button" aria-label="Cerrar imagen">&times;</button>
          <img id="inspLightboxImg" src="" alt="Foto ampliada" />
        </div>
      </div>

      <div class="insp-footer"></div>
      <div class="insp-bottom-logo">
        <img src="img/logo.png" alt="Logo Karen y Sergio" />
      </div>
    </section>
  </main>
  <script>
    (function () {
      const track = document.getElementById('inspTrack');
      if (!track) return;

      const carousel = track.closest('.insp-carousel');
      const viewport = carousel.querySelector('.insp-viewport');
      const prevBtn = carousel.querySelector('.insp-arrow.prev');
      const nextBtn = carousel.querySelector('.insp-arrow.next');
      const fallbackSlides = Array.from(track.children).map((slide) => {
        const img = slide.querySelector('img');
        return img ? img.getAttribute('src') : null;
      }).filter(Boolean);
      const lightbox = document.getElementById('inspLightbox');
      const lightboxImg = document.getElementById('inspLightboxImg');
      const lightboxClose = lightbox.querySelector('.insp-lightbox-close');
      const countdown = document.getElementById('inspCountdown');
      const dateTarget = new Date('2026-07-11T00:00:00');
      let total = 0;
      let cloneCount = 0;
      let isAnimating = false;

      function updateCountdown() {
        if (!countdown) return;
        const now = new Date();
        const diff = dateTarget - now;
        const safeDiff = Math.max(diff, 0);
        const days = Math.floor(safeDiff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((safeDiff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((safeDiff / (1000 * 60)) % 60);
        const seconds = Math.floor((safeDiff / 1000) % 60);
        countdown.querySelector('[data-unit="days"]').textContent = String(days).padStart(3, '0');
        countdown.querySelector('[data-unit="hours"]').textContent = String(hours).padStart(2, '0');
        countdown.querySelector('[data-unit="minutes"]').textContent = String(minutes).padStart(2, '0');
        countdown.querySelector('[data-unit="seconds"]').textContent = String(seconds).padStart(2, '0');
      }

      let index = cloneCount;
      let autoplayId = null;

      function buildSlides(imageUrls) {
        if (!imageUrls || !imageUrls.length) return;
        const unique = [...new Set(imageUrls)];
        if (!unique.length) return;

        track.innerHTML = '';
        unique.forEach(function (src) {
          const figure = document.createElement('figure');
          figure.className = 'insp-slide';
          const img = document.createElement('img');
          img.src = src;
          img.alt = 'Sesion preboda de Karen y Sergio';
          figure.appendChild(img);
          track.appendChild(figure);
        });

        const originals = Array.from(track.children);
        total = originals.length;
        const step = getSlideStep() || 1;
        const visibleCount = Math.max(1, Math.ceil((viewport ? viewport.clientWidth : 0) / step));
        cloneCount = Math.min(total, Math.max(4, visibleCount + 2));
        for (let i = total - cloneCount; i < total; i += 1) {
          track.insertBefore(originals[i].cloneNode(true), track.firstChild);
        }
        for (let i = 0; i < cloneCount; i += 1) {
          track.appendChild(originals[i].cloneNode(true));
        }
        index = cloneCount;
        move(false);
      }

      function imageExists(src) {
        return new Promise(function (resolve) {
          const img = new Image();
          img.onload = function () { resolve(true); };
          img.onerror = function () { resolve(false); };
          img.src = src;
        });
      }

      async function discoverCarouselImages() {
        const found = [];
        const start = 1000;
        const end = 1300;
        const probes = [];

        for (let n = start; n <= end; n += 1) {
          const src = `img/Carrusel/Preboda%20Karen%20%26%20Sergio%20-%20Luis%20Houdin%20WEB%20(${n}%20de%20175).jpg`;
          probes.push(
            imageExists(src).then(function (ok) {
              if (ok) found.push({ n: n, src: src });
            })
          );
        }

        await Promise.all(probes);
        found.sort(function (a, b) { return a.n - b.n; });
        return found.map(function (item) { return item.src; });
      }

      function getSlideStep() {
        const firstSlide = track.children[0];
        if (!firstSlide) return 0;
        const style = window.getComputedStyle(track);
        const gap = parseFloat(style.gap || style.columnGap || '0') || 0;
        return firstSlide.getBoundingClientRect().width + gap;
      }

      function move(animate) {
        track.style.transition = animate ? 'transform 1.8s linear' : 'none';
        track.style.transform = `translateX(${-index * getSlideStep()}px)`;
      }

      function next() {
        if (!total || isAnimating) return;
        if (index >= total + cloneCount - 1) {
          index = cloneCount - 1;
          move(false);
        }
        index += 1;
        isAnimating = true;
        move(true);
      }

      function prev() {
        if (!total || isAnimating) return;
        if (index <= cloneCount) {
          index = total + cloneCount;
          move(false);
        }
        index -= 1;
        isAnimating = true;
        move(true);
      }

      function startAutoplay() {
        if (total <= 1) return;
        stopAutoplay();
        autoplayId = setInterval(next, 2300);
      }

      function stopAutoplay() {
        if (autoplayId) {
          clearInterval(autoplayId);
          autoplayId = null;
        }
      }

      track.addEventListener('transitionend', function () {
        isAnimating = false;
        if (!total) return;
        if (index >= total + cloneCount) {
          index = cloneCount;
          move(false);
        } else if (index < cloneCount) {
          index = total + cloneCount - 1;
          move(false);
        }
      });

      nextBtn.addEventListener('click', function () {
        next();
        startAutoplay();
      });

      prevBtn.addEventListener('click', function () {
        prev();
        startAutoplay();
      });

      track.addEventListener('click', function (event) {
        const target = event.target;
        if (!(target instanceof HTMLImageElement)) return;
        lightboxImg.src = target.src;
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
        stopAutoplay();
      });

      lightboxClose.addEventListener('click', function () {
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        startAutoplay();
      });

      lightbox.addEventListener('click', function (event) {
        if (event.target !== lightbox) return;
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        startAutoplay();
      });

      document.addEventListener('keydown', function (event) {
        if (event.key !== 'Escape') return;
        if (!lightbox.classList.contains('open')) return;
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        startAutoplay();
      });

      carousel.addEventListener('mouseenter', stopAutoplay);
      carousel.addEventListener('mouseleave', startAutoplay);
      carousel.addEventListener('focusin', stopAutoplay);
      carousel.addEventListener('focusout', startAutoplay);
      window.addEventListener('resize', function () {
        isAnimating = false;
        move(false);
      });

      buildSlides(fallbackSlides);
      discoverCarouselImages()
        .then(function (images) {
          if (images.length) buildSlides(images);
        })
        .catch(function () { })
        .finally(function () {
          startAutoplay();
        });

      updateCountdown();
      setInterval(updateCountdown, 1000);
    })();
  </script>
</body>
